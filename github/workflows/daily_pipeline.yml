name: Daily Alpha Pipeline

on:
  schedule:
    - cron: '30 15 * * 1-5'   # 9:00 PM IST = 15:30 UTC, Mon-Fri only
  workflow_dispatch:            # manual trigger anytime from GitHub UI

permissions:
  contents: write               # needed to commit CSV output back to repo

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily alpha pipeline
        run: python -m src.pipeline.run_daily

      - name: Commit and push output CSVs
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/
          git diff --cached --quiet || git commit -m "Daily alpha update $(date +'%Y-%m-%d')"
          git push
